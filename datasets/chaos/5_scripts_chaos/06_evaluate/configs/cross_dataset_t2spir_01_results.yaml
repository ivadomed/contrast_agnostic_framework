title: "CHAOS T2spir models — cross-dataset results"
in_domain_contrast: chaos_t2spir
output_prefix: "04_01_cross_dataset_t2spir"
output_dir: "${PROJECT_ROOT}/datasets/chaos/8_results_chaos/02_metrics/chaos_model/t2spir"

column_order:
  - chaos_t2spir
  - chaos_t1in
  - chaos_t1out
  - chaos_ct_liver
  - amos_ct
  - amos_mri
  - sliver07_ct_liver

sources:
  - metrics_dir: "${PROJECT_ROOT}/datasets/chaos/8_results_chaos/02_metrics/chaos_model/t2spir"
    column_prefix: "chaos_"
    column_rename:
      ct: chaos_ct_liver     # chaos CT GT only has liver
  - metrics_dir: "${PROJECT_ROOT}/datasets/amos/8_results_amos/02_metrics/chaos_model/t2spir"
    column_prefix: "amos_"
  - metrics_dir: "${PROJECT_ROOT}/datasets/sliver07/8_results_sliver07/02_metrics/chaos_model/t2spir"
    column_rename:
      ct: sliver07_ct_liver  # sliver07 GT only has liver
  # NOTE: TRUSTED intentionally NOT included here — its US eval is confounded by a
  # center-bias artifact (see the t1in config note). Excluded from the roll-up.

runs:
  - chaos_t2spir_auglabAug_v26_6_2_train025_val100_20260620_112633
  - chaos_t2spir_v26_6_2_train050_val100_20260620_112122
  - chaos_t2spir_synthseg_EM_20260620_112357
  - chaos_t2spir_synthseg_noEM_20260620_112515
  - chaos_t2spir_auglab_default_20260620_112240
  - chaos_t2spir_baseline_20260620_111146
