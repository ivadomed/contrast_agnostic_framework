val_ratio: 0.15

samples_per_volume: 1
batch_size: null
batch_size_generator: 4
batch_size_segmenter: 8
val_batch_size: 4
pin_memory: true
persistent_workers: true
prefetch_factor: 2
drop_last_train: true
