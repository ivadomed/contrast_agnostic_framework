# @package model
# gen_24: V23 with foreground-quantile chunk boundaries (fix for T2w coverage).
# V23 used linspace(0,1,K+1) giving uniform intensity bins; in T1w 60-90% of
# foreground voxels fall below 0.5, so CSF and GM share the same "dark" chunk
# and cannot be independently remapped. V24 computes chunk boundaries from the
# foreground quantile distribution so each chunk has equal mass, aligning
# naturally with CSF / GM / WM for K=3 and enabling accidental T2w-like maps.

generator:
  gen_version: v24
  apply_guidance_blur: false
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24FgQuantileChunkTargetGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 15.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v24
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24FgQuantileChunkTargetGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.3
    zoom_max: 1.5
    anisotropy_prob: 0.5
    apply_prob: 1.0
