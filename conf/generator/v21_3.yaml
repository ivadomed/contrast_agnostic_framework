# @package model
# gen_21_3: Based on v21_2 with unblurred guidance loss and stronger local_var.
# Changes vs v21_2:
#   - guidance_blurred: 0.0 → guidance_sharp: 30.0 (direct L1, no Gaussian smoothing)
#   - local_var: 30.0 (up from 10.0)

generator:
  gen_version: v21_3
  apply_guidance_blur: false
  edge_threshold: 0.15
  sigmoid_scale: 12.0
  local_var_kernel_size: 5
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 0.0
    guidance_sharp: 30.0
    local_var: 30.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v21_3
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
