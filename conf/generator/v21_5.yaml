# @package model
# gen_21_5: Based on v21_4 — remove original image from model input.
# Changes vs v21_4:
#   - in_channels: 2 (guidance + edge map only, no original image)
#   - skip connection base is now guidance → collapse attractor = guidance (correct contrast)

generator:
  gen_version: v21_5
  in_channels: 2
  no_image_input: true
  apply_guidance_blur: false
  edge_threshold: 0.15
  sigmoid_scale: 12.0
  local_var_kernel_size: 5
  edge_map_threshold_range: [0.15, 0.35]
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 5.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 0.0
    guidance_sharp: 10.0
    local_var: 60.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v21_5
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
