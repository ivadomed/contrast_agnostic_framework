# @package model
# gen_21_2: Based on v19_c with local variance loss replacing texture role of edge loss.
# Changes vs v19_c:
#   - edge_threshold: 0.15 (structural edges only — excludes texture-level gradients)
#   - guidance_blurred: 30.0 (equal partner with edge, up from 10.0)
#   - local_var: 10.0 → gentle texture magnitude regularizer

generator:
  gen_version: v21_2
  apply_guidance_blur: false
  edge_threshold: 0.15
  sigmoid_scale: 12.0
  local_var_kernel_size: 5
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 30.0
    guidance_sharp: 0.0
    local_var: 10.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v21_2
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
