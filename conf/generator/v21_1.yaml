# @package model
# gen_21_1: Based on v21 with reduced edge loss weight.
# Changes vs v21:
#   - edge weight: 15.0 (vs 30.0) → same texture type (threshold=0.02), less grain amount

generator:
  gen_version: v21_1
  apply_guidance_blur: false
  edge_threshold: 0.02
  sigmoid_scale: 12.0
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 15.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 10.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v21_1
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
