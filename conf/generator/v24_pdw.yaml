# @package model
# gen_24_pdw: K=3, CSF dark, GM > WM. Matches ON-Harmony T2w cluster (PDw-like).
# Real T2w in ON-Harmony (p1-p99 normalized regional_hist_64): WM~bin36, GM~bin45,
# CSF~bin0. v24_t2w produced opposite (CSF bright, WM dark). v24_pdw fixes this.

generator:
  gen_version: v24_pdw
  apply_guidance_blur: false
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24PdwTargetGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 15.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v24_pdw
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24PdwTargetGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.3
    zoom_max: 1.5
    anisotropy_prob: 0.5
    apply_prob: 1.0
