# @package model
# gen_24_t2w: V24 with K=3 fixed and T2w-biased mu ranges per chunk.
# Chunk boundaries from foreground quantile (same as V24), but mu is sampled from:
#   chunk 0 (CSF): U(0.6, 1.0) — bright
#   chunk 1 (GM):  U(0.2, 0.8) — medium
#   chunk 2 (WM):  U(0.0, 0.4) — dark
# This biases every guidance map toward T2w-like contrast (CSF bright, WM dark).

generator:
  gen_version: v24_t2w
  apply_guidance_blur: false
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24T2wTargetGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 15.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v24_t2w
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24T2wTargetGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.3
    zoom_max: 1.5
    anisotropy_prob: 0.5
    apply_prob: 1.0
