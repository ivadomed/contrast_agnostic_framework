# @package model
# gen_19: Stochastic Semantic Decoupling.
# Synthesises SynthSeg-style geometric label-priors fused with the v18_6
# texture-preserving latent space.  Injects hallucinated pathological boundaries
# (e.g., T2w/FLAIR edema edges) while preserving biological micro-texture.

generator:
  gen_version: v19
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 30.0
    tv: 0.5
    range: 100.0
    guidance_blurred: 10.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v19
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
