# @package model
# gen_23_1: v22_1 (v19_c + resolution randomization) with randomised chunk count.
# K is drawn each forward pass from {2, 3, 4, 6, 8, 12, 16} (log-spaced, K≥2).
# Motivation: fixed K=8 makes T2w-like contrast (WM-dark, GM-bright) appear in only
# ~0.7% of guidance maps.  With K=2 P(T2w-like) ≈ 16%; randomising K across the set
# raises the effective T2w-favorable frequency to ~2–3× current, giving the network
# enough training signal to learn the WM/GM contrast inversion.
# All other hyperparameters are identical to v22_1.

generator:
  gen_version: v23_1
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V23RandomChunkTargetGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 10.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v23_1
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V23RandomChunkTargetGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.3
    zoom_max: 1.5
    anisotropy_prob: 0.5
    apply_prob: 1.0
