# @package model
# gen_22_2: v19_c + stronger random resolution resampling.
# No new training — reuses v19_c weights.
# Goal: wider zoom range and higher anisotropy probability to cover more of the
#       isotropic/anisotropic resolution space, especially DWI/EPI/GRE modalities.

generator:
  gen_version: v22_2
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 10.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v22_2
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.1
    zoom_max: 4.0
    anisotropy_prob: 0.85
    apply_prob: 1.0
