# @package model
# gen_23_3: v23_2 with sigmoid_scale reduced 3× (12.0 → 4.0).
# sigmoid_scale controls how sharply the Sobel gradient magnitude is converted
# to an edge map via sigmoid(scale * (|grad| - threshold)).  Lowering it from
# 12 to 4 produces much softer, weaker edge maps, reducing the pressure on the
# network to preserve fine structural edges and giving more freedom to follow
# large-scale intensity inversions (T2w-like contrast).

generator:
  gen_version: v23_3
  apply_guidance_blur: false
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V23RandomChunkTargetGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 15.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v23_3
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V23RandomChunkTargetGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.3
    zoom_max: 1.5
    anisotropy_prob: 0.5
    apply_prob: 1.0
