# @package model
# gen_21_4: Based on v21_3 with Sobel edge map as 3rd input channel.
# Changes vs v21_3:
#   - in_channels: 3 (image + guidance + edge map)
#   - edge_map_threshold_range: [0.15, 0.6] (random per-sample threshold)
#   - DiceEdgeLoss uses same random threshold as input channel

generator:
  gen_version: v21_4
  in_channels: 3
  apply_guidance_blur: false
  edge_threshold: 0.15
  sigmoid_scale: 12.0
  local_var_kernel_size: 5
  edge_map_threshold_range: [0.15, 0.6]
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  loss_weights:
    edge: 5.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 0.0
    guidance_sharp: 30.0
    local_var: 60.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v21_4
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  target_generator:
    _target_: src.target_generators.V19LabelConditionedTextureGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
