# @package model
# gen_24_nm2: Adaptive non-monotone mapping with foreground-quantile breakpoints.
# Fixes v24_nm: WM T1w mode is at fg q71-89%, not the fixed 0.60-0.80 range used before.
# x2=fg.quantile(U(0.55,0.75)), x3=fg.quantile(U(0.75,0.90)); y_WM=R*y_GM, R~U(0.45,0.65).

generator:
  gen_version: v24_nm2
  apply_guidance_blur: false
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24NonMonotoneAdaptiveTargetGenerator
  loss_weights:
    edge: 30.0
    tv: 0.0
    range: 100.0
    guidance_blurred: 15.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v24_nm2
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  out_channels: 4
  sigmoid_scale: 4.0
  target_generator:
    _target_: src.target_generators.V24NonMonotoneAdaptiveTargetGenerator
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02
  resolution_resampler:
    zoom_min: 0.3
    zoom_max: 1.5
    anisotropy_prob: 0.5
    apply_prob: 1.0
