defaults:
  - defaults
  - _self_

generator:
  gen_version: v18_7
  base_filters: 8
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V18_7StochasticTargetGenerator
    background_threshold: 0.01
    max_sample_size: 100000
    alpha_min: 0.5
    alpha_max: 2.0
  loss_weights:
    edge: 30.0
    tv: 0.5
    range: 100.0
    guidance_blurred: 10.0
    guidance_sharp: 0.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02

segmenter:
  use_generator: true
  gen_version: v18_7
  aug_prob_val: 1.0
  compile_synthesis: false
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V18_7StochasticTargetGenerator
    background_threshold: 0.01
    max_sample_size: 100000
    alpha_min: 0.5
    alpha_max: 2.0
  guidance_perturber:
    _target_: src.guidance_perturbers.MildGaussianGuidancePerturber
    sigma: 1.0
    kernel_size: 9
    background_threshold: 0.02