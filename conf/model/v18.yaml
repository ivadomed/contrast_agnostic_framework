defaults:
  - defaults
  - _self_

generator:
  gen_version: v18
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V18SpatialBezierTargetGenerator
    coarse_grid_size: [4, 4, 4]
    background_threshold: 0.01
  guidance_perturber: null

segmenter:
  use_generator: true
  gen_version: v18
  apply_guidance_blur: false
  target_generator:
    _target_: src.target_generators.V18SpatialBezierTargetGenerator
    coarse_grid_size: [4, 4, 4]
    background_threshold: 0.01
  guidance_perturber: null
