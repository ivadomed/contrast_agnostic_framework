max_epochs:
  generator: 30
  segmenter: 700

lr:
  generator: 0.0003
  segmenter: 0.0001

betas:
  generator: [0.5, 0.999]
  segmenter: [0.9, 0.999]

weight_decay:
  generator: 0.0
  segmenter: 0.0

eta_min: 0.000001
precision: 16-mixed
deterministic: false
benchmark: true
accelerator: auto
devices: 1
num_nodes: 1
strategy: auto
num_sanity_val_steps: 0
log_every_n_steps: 50
enable_model_summary: false
limit_train_batches: 1.0
limit_val_batches: 1.0

checkpoint:
  dirpath_generator: null
  dirpath_segmenter: null
  filename_generator: mri_generator_{epoch:03d}
  filename_segmenter: segmenter_{epoch:03d}_{val_dice:.4f}
  save_top_k: 3
  monitor_segmenter: val/dice
  mode_segmenter: max

resume: false

generator:
  image_log_every: 500
  enable_image_logging: false
  log_aux_every_n_steps: 100
  gradient_clip_val: 1.0
  compile_model: false
  gpu_aug:
    enabled: true
    affine_prob: 0.8
    affine_rotate_range: [0.35, 0.35, 0.35]
    affine_scale_range: [0.2, 0.2, 0.2]
    elastic_prob: 0.5
    elastic_sigma_range: [10.0, 13.0]
    elastic_magnitude_range: [0.0, 1000.0]

segmenter:
  val_image_log_every: 1
