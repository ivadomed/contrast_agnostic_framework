defaults:
  - data: brats2017
  - segmenter: seg_A    # architecture axis  (conf/segmenter/)
  - generator: baseline  # data-regime axis   (conf/generator/)
  - training: defaults
  - logging: wandb
  - _self_

task: generator
seed: 42
# version is deprecated; run identity is now <segmenter>_<generator> (e.g. seg_A_v19).
# Pass it explicitly on the CLI only when using legacy launch scripts.
version: null

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  searchpath:
    - file://${hydra:runtime.cwd}/datasets/on-harmony/3_conf_on-harmony
    - file://${hydra:runtime.cwd}/datasets/brats2017/3_conf_brats2017
    - file://${hydra:runtime.cwd}/datasets/spider-spine/3_conf_spider-spine
    - file://${hydra:runtime.cwd}/datasets/ms-multi-spine/3_conf_ms-multi-spine
